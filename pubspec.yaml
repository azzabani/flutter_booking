name: flutter_booking
description: "Application mobile de réservation de ressources avec interface moderne et système d'administration complet"

# Empêche la publication sur pub.dev
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Backend et authentification
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # State management et navigation
  provider: ^6.1.2
  
  # UI Components
  table_calendar: ^3.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8

  # Génération de documents PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets de l'application
  assets:
    - assets/images/


 