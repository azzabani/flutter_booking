# Configuration de l'analyseur Dart pour Flutter Booking
# Ce fichier configure l'analyseur statique qui vérifie les erreurs, 
# avertissements et règles de style dans le code Dart.

# Active un ensemble de règles recommandées pour les applications Flutter
include: package:flutter_lints/flutter.yaml

linter:
  # Règles de linting personnalisées pour ce projet
  # Documentation complète : https://dart.dev/lints
  rules:
    # Règles de style recommandées pour ce projet
    prefer_single_quotes: true        # Utiliser des guillemets simples
    avoid_print: false               # Autoriser print() pour le debug
    prefer_const_constructors: true   # Préférer les constructeurs const
    prefer_const_literals_to_create_immutables: true
    
    # Règles de performance
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    
    # Règles de lisibilité
    always_declare_return_types: true
    prefer_final_fields: true
    prefer_final_locals: true

# Analyseur Dart - Configuration avancée
analyzer:
  # Exclure certains fichiers de l'analyse
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  
  # Configuration des erreurs
  errors:
    # Traiter certains warnings comme des erreurs
    invalid_annotation_target: ignore
